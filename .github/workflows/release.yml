name: Release

# Publishing is driven by GitHub Releases: cut a release for a tag like
# `v0.1.0` and this workflow builds + publishes `@react-fancy-menus/core` to npm
# with provenance. The git tag therefore always pins the exact commit on npm.
#
# Auth uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. The publish is
# authorized by the trusted-publisher rule on npmjs.com that pins this repo +
# workflow filename. Provenance is emitted automatically. If the account has
# staged publishing enabled, the publish lands in staging and a maintainer
# approves it (with 2FA) on npmjs.com before it goes public.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 22 (>= 22.14.0) provides the runtime; bun runs the build/tests.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; the npm bundled with
      # Node 22 is older, so upgrade to latest before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter @react-fancy-menus/core test

      # No token: OIDC + the npmjs.com trusted-publisher rule authorize this.
      # prepublishOnly runs `bun run build`; provenance is automatic under OIDC.
      - name: Publish to npm
        working-directory: packages/core
        run: npm publish --access public
