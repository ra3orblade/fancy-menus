name: Release

# Publishing is driven by GitHub Releases: cut a release for a tag like
# `v0.1.0` and this workflow builds + publishes `@react-fancy-menus/core` to npm
# with provenance. The git tag therefore always pins the exact commit on npm.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm (via setup-node) handles auth + provenance; bun runs the build.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter @react-fancy-menus/core test

      # prepublishOnly runs `bun run build`; --provenance needs npm >= 9.5
      # (bundled with node 22) running in this id-token-enabled job.
      - name: Publish to npm
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
