name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (core + playground)
        run: bun --filter '*' typecheck

      - name: Lint
        run: bunx biome ci .
        continue-on-error: true # remove once Biome rules settle

      - name: Build playground
        working-directory: examples/playground
        run: bun run build

      - name: Cache puppeteer browser
        id: puppeteer-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('examples/playground/bun.lock') }}

      - name: Install puppeteer browser
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        working-directory: examples/playground
        run: bunx puppeteer browsers install chrome

      - name: Run dev server in background
        working-directory: examples/playground
        run: |
          bun run dev > /tmp/fm-dev.log 2>&1 &
          echo $! > /tmp/fm-dev.pid
          # Wait for Vite to start
          for i in {1..30}; do
            if grep -q "Local:" /tmp/fm-dev.log; then break; fi
            sleep 1
          done
          cat /tmp/fm-dev.log

      - name: Smoke + interaction tests
        working-directory: examples/playground
        run: |
          URL=$(grep -oE 'http://localhost:[0-9]+/' /tmp/fm-dev.log | head -1 | sed 's:/$::')
          URL=$URL bun scripts/smoke.mjs
          URL=$URL bun scripts/interact.mjs
          URL=$URL bun scripts/cascading.mjs
          URL=$URL bun scripts/visual.mjs

      - name: Stop dev server
        if: always()
        run: kill $(cat /tmp/fm-dev.pid) || true
